name: FreqAI Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'freqtrade/templates/FreqaiExampleStrategy.py'
      - 'config_examples/config_freqai.example.json'
      - 'tests/test_freqai_*.py'
      - '.github/workflows/freqai-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'freqtrade/templates/FreqaiExampleStrategy.py'
      - 'config_examples/config_freqai.example.json'
      - 'tests/test_freqai_*.py'
      - '.github/workflows/freqai-tests.yml'

jobs:
  test-freqai:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install pytest pytest-cov pytest-mock pandas numpy
        
    - name: Run FreqAI feature engineering tests
      run: |
        pytest tests/test_freqai_feature_engineering.py -v --cov=freqtrade.templates.FreqaiExampleStrategy --cov-report=term-missing
        
    - name: Run FreqAI strategy tests
      run: |
        pytest tests/test_freqai_strategy.py -v --cov=freqtrade.templates.FreqaiExampleStrategy --cov-report=term-missing
        
    - name: Run FreqAI configuration tests
      run: |
        pytest tests/test_freqai_configuration.py -v
        
    - name: Run all FreqAI tests with coverage
      run: |
        pytest tests/test_freqai_*.py -v --cov=freqtrade.templates.FreqaiExampleStrategy --cov-report=xml --cov-report=term-missing
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: freqai
        name: freqai-coverage
        
  lint-freqai:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
        
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
        
    - name: Run flake8
      run: |
        flake8 freqtrade/templates/FreqaiExampleStrategy.py --max-line-length=100 --ignore=E203,W503
        
    - name: Run black (code formatting check)
      run: |
        black --check --diff freqtrade/templates/FreqaiExampleStrategy.py
        
    - name: Run isort (import sorting check)
      run: |
        isort --check-only --diff freqtrade/templates/FreqaiExampleStrategy.py
        
    - name: Run mypy (type checking)
      run: |
        mypy freqtrade/templates/FreqaiExampleStrategy.py --ignore-missing-imports
        
  integration-test:
    runs-on: ubuntu-latest
    needs: [test-freqai, lint-freqai]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Test configuration file validity
      run: |
        python -c "
        import json
        with open('config_examples/config_freqai.example.json', 'r') as f:
            config = json.load(f)
        print('Configuration file is valid JSON')
        assert config['freqai']['enabled'] == True
        print('FreqAI is enabled')
        assert 'feature_parameters' in config['freqai']
        print('Feature parameters section exists')
        "
        
    - name: Test strategy import
      run: |
        python -c "
        from freqtrade.templates.FreqaiExampleStrategy import FreqaiExampleStrategy
        strategy = FreqaiExampleStrategy()
        print('Strategy imported successfully')
        print(f'Strategy class: {strategy.__class__.__name__}')
        print(f'Startup candle count: {strategy.startup_candle_count}')
        "
        
    - name: Test feature engineering functions
      run: |
        python -c "
        import pandas as pd
        import numpy as np
        from freqtrade.templates.FreqaiExampleStrategy import FreqaiExampleStrategy
        
        # Create test data
        dates = pd.date_range('2023-01-01', periods=100, freq='5min')
        df = pd.DataFrame({
            'date': dates,
            'open': np.random.randn(100).cumsum() + 100,
            'high': np.random.randn(100).cumsum() + 102,
            'low': np.random.randn(100).cumsum() + 98,
            'close': np.random.randn(100).cumsum() + 100,
            'volume': np.random.randint(1000, 10000, 100)
        })
        
        # Test strategy
        strategy = FreqaiExampleStrategy()
        strategy.freqai_info = {
            'feature_parameters': {
                'label_period_candles': 24,
                'indicator_periods_candles': [10, 20, 50],
                'include_timeframes': ['5m', '15m', '1h', '4h'],
                'include_corr_pairlist': ['BTC/USDT:USDT', 'ETH/USDT:USDT'],
                'include_shifted_candles': 3
            }
        }
        
        metadata = {'pair': 'BTC/USDT:USDT', 'tf': '5m', 'period': 10}
        
        # Test feature engineering
        result = strategy.feature_engineering_expand_all(df.copy(), 10, metadata)
        print(f'Features created: {len([col for col in result.columns if col.startswith(\"%-\")])}')
        
        # Test target generation
        result = strategy.set_freqai_targets(df.copy(), metadata)
        print(f'Targets created: {len([col for col in result.columns if col.startswith(\"&-\")])}')
        
        print('All feature engineering tests passed!')
        "
        
  documentation-test:
    runs-on: ubuntu-latest
    needs: [test-freqai, lint-freqai]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
        
    - name: Install documentation tools
      run: |
        python -m pip install --upgrade pip
        pip install docstring-parser
        
    - name: Check strategy docstrings
      run: |
        python -c "
        from freqtrade.templates.FreqaiExampleStrategy import FreqaiExampleStrategy
        import inspect
        
        strategy = FreqaiExampleStrategy()
        
        # Check that all methods have docstrings
        methods = [method for method in dir(strategy) if callable(getattr(strategy, method)) and not method.startswith('_')]
        
        for method in methods:
            doc = getattr(strategy, method).__doc__
            if doc is None:
                print(f'WARNING: Method {method} has no docstring')
            else:
                print(f'✓ Method {method} has docstring')
                
        print('\\nDocstring check completed!')
        "
        
    - name: Check configuration documentation
      run: |
        python -c "
        import json
        
        with open('config_examples/config_freqai.example.json', 'r') as f:
            config = json.load(f)
            
        # Check that configuration has reasonable values
        freqai = config['freqai']
        
        print('Configuration validation:')
        print(f'  - FreqAI enabled: {freqai[\"enabled\"]}')
        print(f'  - Training period: {freqai[\"train_period_days\"]} days')
        print(f'  - Backtest period: {freqai[\"backtest_period_days\"]} days')
        print(f'  - Identifier: {freqai[\"identifier\"]}')
        
        feature_params = freqai['feature_parameters']
        print(f'  - Timeframes: {feature_params[\"include_timeframes\"]}')
        print(f'  - Correlation pairs: {feature_params[\"include_corr_pairlist\"]}')
        print(f'  - Indicator periods: {feature_params[\"indicator_periods_candles\"]}')
        
        print('\\nConfiguration validation completed!')
        "
